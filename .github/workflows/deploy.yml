name: Deploy hello-flask

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "frontend/**"
      - "charts/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE_NAME: ${{ github.repository }}/hello-flask-backend
  FRONTEND_IMAGE_NAME: ${{ github.repository }}/hello-flask-frontend
  IMAGE_TAG: ${{ github.sha }}
  NAMESPACE: hello-flask

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint Helm charts
        run: |
          helm lint charts/hello-flask-backend
          helm lint charts/hello-flask-frontend

      - name: Configure kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG }}" | base64 --decode > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Deploy backend chart
        run: |
          helm upgrade --install hello-flask-backend charts/hello-flask-backend \
            --namespace "$NAMESPACE" \
            --create-namespace \
            --set image="${REGISTRY}/${BACKEND_IMAGE_NAME}:${IMAGE_TAG}" \
            --wait \
            --timeout 5m

      - name: Deploy frontend chart
        run: |
          helm upgrade --install hello-flask-frontend charts/hello-flask-frontend \
            --namespace "$NAMESPACE" \
            --create-namespace \
            --set image="${REGISTRY}/${FRONTEND_IMAGE_NAME}:${IMAGE_TAG}" \
            --wait \
            --timeout 5m
