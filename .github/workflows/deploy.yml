name: Build hello-flask images

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "frontend/**"
      - "charts/**"
      - ".github/workflows/deploy.yml"
      - "scripts/**"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE_NAME: ${{ github.repository }}/hello-flask-backend
  FRONTEND_IMAGE_NAME: ${{ github.repository }}/hello-flask-frontend
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint Helm charts
        run: |
          helm lint charts/hello-flask-backend
          helm lint charts/hello-flask-frontend

      - name: Update Helm image values
        run: |
          python3 scripts/update_helm_images.py \
            --backend-image "${REGISTRY}/${BACKEND_IMAGE_NAME}:${IMAGE_TAG}" \
            --frontend-image "${REGISTRY}/${FRONTEND_IMAGE_NAME}:${IMAGE_TAG}"

      - name: Commit image value changes
        run: |
          if git diff --quiet charts/hello-flask-backend/values.yaml charts/hello-flask-frontend/values.yaml; then
            echo "Helm image values are already current."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add charts/hello-flask-backend/values.yaml charts/hello-flask-frontend/values.yaml
          git commit -m "Update hello-flask image tags [skip ci]"
          git push
